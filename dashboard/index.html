<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opportunity Radar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="top">
      <div class="wordmark">
        <span class="logo-dot">◎</span>
        <h1>Opportunity Radar</h1>
      </div>
      <svg class="badge" viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <path id="badge-arc-top" d="M 8,56 A 42,42 0 0 1 92,56" />
        </defs>
        <circle cx="50" cy="50" r="47" class="badge-ring" />
        <text font-size="7.2" font-weight="700" letter-spacing="0.5" text-anchor="middle">
          <textPath href="#badge-arc-top" startOffset="50%">WEEKLY · HONEST</textPath>
        </text>
        <text x="50" y="60" text-anchor="middle" class="badge-center-1">RADAR</text>
        <text x="50" y="72" text-anchor="middle" class="badge-center-2">EDITION</text>
      </svg>
    </header>

    <nav id="pills" class="pills"></nav>

    <div id="loading" class="status">Loading digests…</div>
    <div id="error" class="status error" style="display:none;"></div>

    <main id="feed"></main>
  </div>

  <div id="overlay" class="overlay" hidden>
    <div class="sheet">
      <button id="closeSheet" class="close-btn" aria-label="Close">✕</button>
      <div id="sheetContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
